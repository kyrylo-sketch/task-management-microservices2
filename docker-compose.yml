version: '3.8'

services:

  frontend:
    image: gavrilukkirilo/taskfrontend:v1
    ports:
      - "3000:80"

  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8765:8765"
    environment:
      - JWT_SECRET={JWT_SECRET}
      - EUREKA_URI=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - MONGO_URI={MONGO_URI}
      - JWT_SECRET={JWT_SECRET}
      - EUREKA_URI=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy

  project-service:
    build: ./project-service
    ports:
      - "8082:8082"
    environment:
      - MONGO_URI={MONGO_URI}
      - EUREKA_URI=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy

  task-service:
    build: ./task-service
    ports:
      - "8083:8083"
    environment:
      - MONGO_URI={MONGO_URI}
      - EUREKA_URI=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy

  comment-service:
    build: ./comment-service
    ports:
      - "8084:8084"
    environment:
      - MONGO_URI={MONGO_URI}
      - EUREKA_URI=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy
