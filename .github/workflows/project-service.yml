name: Build and Deploy Project Service

on:
  push:
    branches:
      - main
    paths:
      - 'project-service/**'

jobs:
  build-deploy:
    name: Build and Deploy Project Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          cache: 'maven'
          java-version: 21

      - name: Unit Tests
        run: mvn -B test --file project-service/pom.xml

      - name: Build the application
        run: mvn -B clean package --file project-service/pom.xml -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./project-service
          file: ./project-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/project-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/project-service:latest