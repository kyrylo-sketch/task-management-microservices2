name: Build and Deploy Comment Service

on:
  push:
    branches:
      - main
    paths:
      - 'comment-service/**'

jobs:
  build-deploy:
    name: Build and Deploy Comment Sevice
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          cache: 'maven'
          java-version: 21
          distribution: 'corretto'

      - name: Unit Tests
        run: mvn -B test --file comment-service/pom.xml

      - name: Build the application
        run: mvn -B clean package --file comment-service/pom.xml -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          file: ./comment-service/Dockerfile
          context: ./comment-service
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME}}/comment-service:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME}}/comment-service:latest