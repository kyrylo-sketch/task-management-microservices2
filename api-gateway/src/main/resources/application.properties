spring.application.name=api-gateway


server.port=8765

jwt.secret=${JWT_SECRET}
eureka.client.service-url.defaultZone=${EUREKA_URI}

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

logging.level.org.springframework.cloud.gateway.server.webmvc=TRACE
logging.level.org.springframework.cloud.loadbalancer=DEBUG

spring.cloud.gateway.server.webmvc.enabled=true
spring.cloud.gateway.server.webmvc.http-client.type=simple

spring.web.cors.allowed-origins=http://localhost:3000

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true


#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/user/**

spring.cloud.gateway.server.webmvc.routes[2].id=project-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://PROJECT-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.server.webmvc.routes[3].id=task-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://TASK-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/tasks/**

spring.cloud.gateway.server.webmvc.routes[4].id=comment-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/comments/**